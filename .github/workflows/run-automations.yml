name: E2E (Playwright + Percy)

on:
  push:
    branches: [ "main" ]         
  
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        shell: bash
        run: echo "version=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}-chromium-webkit

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium webkit

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit

      - name: Run Playwright with Percy
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
          FLIGHT_API: ${{ secrets.FLIGHT_API }}
          TESTING_TYPE: ${{ vars.TESTING_TYPE }}

        shell: bash
        run: |
          set -e

          if [ "$TESTING_TYPE" = "production" ]; then
            npx playwright test \
                "tests/Production" \
                --workers 4
          elif [ "$TESTING_TYPE" = "fav" ]; then
            npx percy exec -- \
              npx playwright test \
                "tests/Travel documents/" \
                "tests/Passport-tests/" \
                "tests/Mobile/" \
                "tests/visual/" \
                "/tests/wolf-tests" \
                --workers 4 \
              2>&1 | tee percy.log
          else
            npx playwright test \
                "tests/Travel documents/" \
                "tests/Passport-tests/" \
                "tests/Mobile/" \
                "tests/visual/" \
                "/tests/wolf-tests" \
                --workers 4
          fi

      - name: Get latest Percy build ID
        if: always()
        shell: bash
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
          TESTING_TYPE: ${{ vars.TESTING_TYPE }}

        run: |
          if [ "$TESTING_TYPE" = "fav" ]; then
          cat > get-percy-build.mjs <<'EOF'
            const res = await fetch('https://percy.io/api/v1/builds', {
              method: 'GET',
              headers: {
                Authorization: `Token token=${process.env.PERCY_TOKEN}`,
                'Content-Type': 'application/json'
              }
            });

            if (!res.ok) {
              console.error(`Percy API failed with status ${res.status}`);
              process.exit(1);
            }

            const payload = await res.json();
            const latestBuild = payload?.data?.[0];
            const buildId = latestBuild?.id ?? '';

            if (!buildId) {
              console.error('No Percy build ID found in API response.');
              process.exit(1);
            }

            console.log(`BUILD_ID=${buildId}`);
          EOF

            BUILD_LINE=$(node get-percy-build.mjs)
            echo "$BUILD_LINE" >> "$GITHUB_ENV"
            echo "$BUILD_LINE"
          fi 

      - name: Wait before generating Percy report
        if: always()
        run: sleep 50

      - name: Create Percy Report
        if: always()
        env:
          TESTING_TYPE: ${{ vars.TESTING_TYPE }}
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
        run: |
          if [ "$TESTING_TYPE" = "fav" ]; then
            npx percy-report generate "$BUILD_ID" --download-path "playwright-report"
          fi
      
      - name: Show files to be published
        if: always()
        run: |
          echo "Publishing these files:"
          find playwright-report -maxdepth 3 -type f | sort

      - name: Upload Playwright report to Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

      - name: Deploy to GitHub Pages
        id: deployment
        if: always()
        uses: actions/deploy-pages@v4

      - name: Send results to slack
        if: ${{ always() }}
        run: node sendReport.js $BUILD_ID $TESTING_TYPE